<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Wayfarer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <h3 class="mb-0">🌍 Wayfarer</h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="plan-trip.html">Plan Trip</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Payment Section -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-4">Complete Your Booking</h2>
            <div class="row">
                <div class="col-md-5">
                    <div class="card shadow">
                        <div class="card-header bg-info text-white">
                            <h4 class="mb-0">Booking Summary</h4>
                        </div>
                        <div class="card-body" id="summary-content">
                            <p class="text-muted">Select a destination and generate a plan to see booking details.</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="card shadow">
                        <div class="card-header bg-primary text-white">
                            <h4 class="mb-0">Payment Details</h4>
                        </div>
                        <div class="card-body">
                            <form id="payment-form" onsubmit="processPayment(event)">
                                <div class="mb-3">
                                    <label class="form-label">Full Name:</label>
                                    <input type="text" id="card-name" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email:</label>
                                    <input type="email" id="card-email" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Phone:</label>
                                    <input type="tel" id="card-phone" class="form-control" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Hotel Selection:</label>
                                    <select id="hotel-select" class="form-select" required>
                                        <option value="">-- Select Hotel --</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Total Amount (₹):</label>
                                    <input type="number" id="total-amount" class="form-control" readonly>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Payment Method:</label>
                                    <select id="payment-method" class="form-select" required>
                                        <option value="">-- Select Payment Method --</option>
                                        <option value="upi">UPI</option>
                                        <option value="card">Credit/Debit Card</option>
                                        <option value="netbanking">Net Banking</option>
                                    </select>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">Pay Now</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2024 Wayfarer. All rights reserved. | Diploma Final Year Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="common.js"></script>
    <script src="payment.js"></script>
</body>
</html>
