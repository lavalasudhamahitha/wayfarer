<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Your Trip - Wayfarer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <h3 class="mb-0">🌍 Wayfarer</h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="plan-trip.html">Plan Trip</a>
                    </li>
                    
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Trip Planning Section -->
    <section class="py-5">
        <div class="container">
            <h2 class="text-center mb-4">Plan Your Trip</h2>
            
            <!-- Destination Info -->
            <div id="destination-info" class="alert alert-info mb-4" style="display: none;">
                <h5>Selected Destination: <span id="dest-name"></span></h5>
            </div>

            <!-- Trip Details Form -->
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow">
                        <div class="card-body p-4">
                            <form id="trip-form">
                                <div class="mb-3">
                                    <label for="days" class="form-label fw-bold">Number of Days:</label>
                                    <input type="number" id="days" class="form-control" min="1" max="30" placeholder="e.g., 5" required>
                                </div>
                                <div class="mb-3">
                                    <label for="budget" class="form-label fw-bold">Budget (₹):</label>
                                    <input type="number" id="budget" class="form-control" min="1000" placeholder="e.g., 50000" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Select Hotel:</label>
                                    <div id="selected-hotel-display" class="alert alert-info mb-2" style="display: none;">
                                        <strong>Selected:</strong> <span id="selected-hotel-name"></span>
                                    </div>
                                    <button type="button" class="btn btn-outline-primary w-100" onclick="openHotelSelectionModal()">View & Select Hotels</button>
                                </div>
                                <button type="button" class="btn btn-primary w-100" onclick="generateDayByDayPlan()">Generate Day-by-Day Schedule</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Day-by-Day Schedule -->
            <div id="schedule-container" class="mt-5" style="display: none;">
                <h3 class="text-center mb-4">Your Day-by-Day Travel Schedule</h3>
                <div id="schedule-days" class="row g-4"></div>
                
                <!-- Payment Section -->
                <div id="payment-section" class="mt-5" style="display: none;">
                    <div class="card shadow-lg border-success">
                        <div class="card-header bg-success text-white">
                            <h4 class="mb-0">Complete Your Booking</h4>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6">
                                    <h5>Booking Summary</h5>
                                    <div id="booking-summary-content"></div>
                                </div>
                                <div class="col-md-6">
                                    <h5>Payment Details</h5>
                                    <form id="payment-form" onsubmit="processPayment(event)">
                                        <div class="mb-3">
                                            <label class="form-label">Full Name:</label>
                                            <input type="text" id="card-name" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Email:</label>
                                            <input type="email" id="card-email" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Phone:</label>
                                            <input type="tel" id="card-phone" class="form-control" required>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Payment Method:</label>
                                            <select id="payment-method" class="form-select" required>
                                                <option value="">-- Select Payment Method --</option>
                                                <option value="upi">UPI</option>
                                                <option value="card">Credit/Debit Card</option>
                                                <option value="netbanking">Net Banking</option>
                                            </select>
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label">Total Amount (₹):</label>
                                            <input type="number" id="total-amount" class="form-control" readonly>
                                        </div>
                                        <button type="submit" class="btn btn-success w-100 btn-lg">Pay Now</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Hotel Selection Modal -->
    <div class="modal fade" id="hotelSelectionModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Select a Hotel</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="hotels-grid-modal" class="row g-3"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2024 Wayfarer. All rights reserved. | Diploma Final Year Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="common.js"></script>
    <script src="plan-trip.js"></script>
</body>
</html>
